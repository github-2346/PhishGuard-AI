spring.application.name=phishguard-api

# Server configuration
server.port=${PORT:8080}

spring.datasource.url=jdbc:postgresql://localhost:5432/phishguarddb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP) — optimized for Neon's serverless
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.keepalive-time=60000

# Hibernate/JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# JWT Configuration
jwt.secret=PhishGuardSuperSecretKeyForJWTGeneration2026!@#$%^&*()
jwt.expiration=${JWT_EXPIRATION:86400000}

# Security APIs

virustotal.api.key=87bf611cfd0afef6984b7c5d8fcf6bf4b09c8eab2c8facffbb98df0e611e739c
google.safebrowsing.api.key=AIzaSyDF_TK_QnMiTnNMJGaEkzpTCbjsdR9Nays

# CORS Configuration
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
